<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L-App</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="L-App">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "b09e52d5-39d7-490c-b911-416ae08b6e1a",
                allowLocalhostAsSecureOrigin: true,
                notifyButton: { enable: false },
                serviceWorkerParam: { scope: "/" },
                serviceWorkerPath: "OneSignalSDKWorker.js",
                promptOptions: {
                    slidedown: {
                        prompts: [{
                            type: "push",
                            autoPrompt: true,
                            text: {
                                actionMessage: "Get notified when friends post, message or like your posts",
                                acceptButton: "Allow",
                                cancelButton: "Later"
                            },
                            delay: { pageViews: 1, timeDelay: 3 }
                        }]
                    }
                }
            });
        });
    </script>
    <style>
        :root { --neon:#00ff88; --bg:#050505; --card:#0f0f0f; --card2:#161616; --border:#1e1e1e; --muted:#555; }
        * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
        body { background:var(--bg); color:white; font-family:'Syne',sans-serif; padding-bottom:85px; overflow-x:hidden; min-height:100vh; transition:background 0.3s,color 0.3s; }
        body.light { --bg:#f5f5f5; --card:#ffffff; --card2:#efefef; --border:#ddd; --muted:#999; color:#111; }

        .page { display:none; padding:20px 16px; min-height:100vh; }
        .page.active { display:block; }
        .logo { font-family:'Space Mono',monospace; color:var(--neon); font-weight:700; letter-spacing:4px; text-transform:uppercase; font-size:1.3rem; }
        .section-title { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin:24px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--border); }

        .btn { border:none; padding:13px 18px; width:100%; border-radius:10px; font-weight:700; cursor:pointer; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; transition:opacity 0.2s,transform 0.1s; font-family:'Space Mono',monospace; }
        .btn:active { transform:scale(0.97); opacity:0.85; }
        .btn:disabled { opacity:0.35; cursor:not-allowed; }
        .btn-neon { background:var(--neon); color:#000; }
        .btn-ghost { background:var(--card2); color:inherit; border:1px solid var(--border); }
        .btn-danger { background:transparent; color:#ff4444; border:1px solid #ff444433; }
        .btn-sm { padding:8px 14px; width:auto; font-size:10px; }

        .input { background:var(--card2); border:1px solid var(--border); color:inherit; padding:13px 15px; width:100%; border-radius:10px; outline:none; font-size:13px; font-family:'Syne',sans-serif; transition:border-color 0.2s; margin-bottom:10px; }
        .input:focus { border-color:var(--neon); }
        .input::placeholder { color:var(--muted); }
        .card { background:var(--card); border-radius:16px; border:1px solid var(--border); padding:16px; margin-bottom:14px; }

        /* NAV */
        .nav-bar { position:fixed; bottom:0; left:0; right:0; background:rgba(5,5,5,0.97); backdrop-filter:blur(20px); display:flex; justify-content:space-around; padding:14px 0 calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--border); z-index:1000; }
        body.light .nav-bar { background:rgba(245,245,245,0.97); }
        .nav-item { color:var(--muted); font-size:8px; font-weight:800; font-family:'Space Mono',monospace; letter-spacing:1px; cursor:pointer; text-align:center; flex:1; padding:6px 4px; border-radius:8px; transition:color 0.2s; text-transform:uppercase; }
        .nav-item.active { color:var(--neon); }
        .nav-item .nav-icon { font-size:18px; display:block; margin-bottom:3px; position:relative; }

        /* LOGIN */
        #loginPage { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 24px; }
        .login-logo { font-family:'Space Mono',monospace; font-size:3rem; color:var(--neon); letter-spacing:8px; margin-bottom:8px; }
        .login-sub { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:50px; font-family:'Space Mono',monospace; }
        .login-form { width:100%; max-width:320px; }

        /* STORIES */
        .stories-bar { display:flex; gap:12px; overflow-x:auto; padding:0 0 12px; margin-bottom:16px; scrollbar-width:none; }
        .stories-bar::-webkit-scrollbar { display:none; }
        .story-item { flex-shrink:0; text-align:center; cursor:pointer; }
        .story-ring { width:62px; height:62px; border-radius:50%; padding:2px; background:linear-gradient(135deg,var(--neon),#00aaff); display:flex; align-items:center; justify-content:center; }
        .story-ring.seen { background:var(--border); }
        .story-avatar { width:56px; height:56px; border-radius:50%; background:var(--card2); border:2px solid var(--bg); display:flex; align-items:center; justify-content:center; font-size:20px; font-family:'Space Mono',monospace; color:var(--neon); font-weight:700; overflow:hidden; }
        .story-avatar img { width:100%; height:100%; object-fit:cover; }
        .story-label { font-size:9px; color:var(--muted); margin-top:4px; font-family:'Space Mono',monospace; max-width:62px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .story-add { width:62px; height:62px; border-radius:50%; background:var(--card2); border:2px dashed var(--neon); display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; }

        /* STORY VIEWER */
        .story-viewer { position:fixed; inset:0; background:#000; z-index:5000; display:none; flex-direction:column; }
        .story-viewer.open { display:flex; }
        .story-viewer .story-media-wrap { flex:1; min-height:0; }
        .story-progress-bar { display:flex; gap:4px; padding:12px 12px 0; }
        .story-progress-seg { flex:1; height:3px; background:rgba(255,255,255,0.3); border-radius:2px; overflow:hidden; }
        .story-progress-fill { height:100%; background:white; width:0%; transition:width linear; }
        .story-header { display:flex; align-items:center; gap:10px; padding:10px 12px; }
        .story-user-avatar { width:36px; height:36px; border-radius:50%; background:var(--card2); border:2px solid var(--neon); display:flex; align-items:center; justify-content:center; font-size:14px; font-family:'Space Mono',monospace; color:var(--neon); font-weight:700; overflow:hidden; }
        .story-user-avatar img { width:100%; height:100%; object-fit:cover; }
        .story-username { font-family:'Space Mono',monospace; font-size:12px; color:white; font-weight:700; }
        .story-time { font-size:9px; color:rgba(255,255,255,0.6); }
        .story-close { margin-left:auto; background:none; border:none; color:white; font-size:22px; cursor:pointer; }
        .story-media-wrap { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
        .story-media-wrap img, .story-media-wrap video { max-width:100%; max-height:100%; object-fit:contain; }
        .story-tap-left { position:absolute; left:0; top:0; width:40%; height:100%; }
        .story-tap-right { position:absolute; right:0; top:0; width:40%; height:100%; }
        .story-caption-overlay { position:absolute; bottom:10px; left:16px; right:16px; background:rgba(0,0,0,0.6); border-radius:12px; padding:10px 14px; font-size:13px; color:white; }
        .story-footer { display:flex; align-items:center; gap:10px; padding:12px 16px 16px; background:rgba(0,0,0,0.85); flex-shrink:0; position:relative; z-index:10; border-top:1px solid rgba(255,255,255,0.1); }
        .story-reply-input { flex:1; background:rgba(255,255,255,0.18); border:1.5px solid rgba(255,255,255,0.4); color:white; padding:12px 16px; border-radius:24px; outline:none; font-size:14px; font-family:'Syne',sans-serif; }
        .story-reply-input::placeholder { color:rgba(255,255,255,0.5); }
        .story-action-btn { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.2); color:white; font-size:22px; cursor:pointer; padding:8px 10px; display:flex; flex-direction:column; align-items:center; gap:3px; flex-shrink:0; border-radius:12px; }
        .story-action-btn span { font-size:9px; font-family:'Space Mono',monospace; color:rgba(255,255,255,0.7); }
        .story-who-panel { position:absolute; bottom:80px; left:0; right:0; background:rgba(0,0,0,0.85); border-top:1px solid rgba(255,255,255,0.1); padding:14px 16px; max-height:200px; overflow-y:auto; display:none; }
        .story-who-panel.open { display:block; }
        .story-who-item { display:flex; align-items:center; gap:10px; padding:6px 0; border-bottom:1px solid rgba(255,255,255,0.08); font-size:12px; color:white; font-family:'Space Mono',monospace; }

        /* POST CARD */
        .post-card { background:var(--card); border-radius:18px; border:1px solid var(--border); margin-bottom:18px; overflow:hidden; }
        .post-header { padding:14px 16px 10px; display:flex; justify-content:space-between; align-items:center; }
        .post-user { font-family:'Space Mono',monospace; font-size:11px; color:var(--neon); font-weight:700; cursor:pointer; display:flex; align-items:center; gap:8px; }
        .online-dot { width:7px; height:7px; border-radius:50%; background:#00ff88; display:inline-block; flex-shrink:0; }
        .offline-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); display:inline-block; flex-shrink:0; }
        .post-media { width:100%; display:block; background:#000; max-height:420px; object-fit:cover; }
        .post-caption { padding:10px 16px 6px; font-size:13px; color:inherit; line-height:1.5; }
        .post-expiry { padding:4px 16px; font-size:9px; color:var(--muted); font-family:'Space Mono',monospace; }

        /* POST ACTIONS */
        .post-actions { display:flex; align-items:center; padding:8px 12px; border-top:1px solid var(--border); gap:2px; }
        .action-btn { background:none; border:none; color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; cursor:pointer; padding:6px 8px; border-radius:8px; display:flex; align-items:center; gap:4px; transition:color 0.2s,background 0.2s; }
        .action-btn:active { background:var(--card2); }
        .action-btn.liked { color:#ff4d6d; }
        .action-btn.saved { color:#ffaa00; }
        .action-icon { font-size:15px; }
        @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
        .action-btn.liked .action-icon { animation:pop 0.25s ease; }

        /* COMMENTS */
        .comments-section { border-top:1px solid var(--border); padding:12px 14px; display:none; }
        .comments-section.open { display:block; }
        .comment-item { display:flex; gap:8px; margin-bottom:10px; align-items:flex-start; }
        .comment-avatar { width:26px; height:26px; border-radius:50%; background:var(--card2); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:10px; font-family:'Space Mono',monospace; color:var(--neon); flex-shrink:0; font-weight:700; overflow:hidden; }
        .comment-avatar img { width:100%; height:100%; object-fit:cover; }
        .comment-body { flex:1; }
        .comment-user { font-size:10px; color:var(--neon); font-family:'Space Mono',monospace; font-weight:700; margin-bottom:2px; }
        .comment-text { font-size:12px; color:#ccc; line-height:1.4; }
        .comment-input-row { display:flex; gap:8px; margin-top:10px; }
        .comment-input-row .input { margin-bottom:0; font-size:12px; padding:10px 12px; }

        /* POPUP */
        .popup-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:3000; display:none; align-items:flex-end; justify-content:center; }
        .popup-overlay.open { display:flex; }
        .popup-sheet { background:var(--card); border-radius:24px 24px 0 0; border:1px solid var(--border); width:100%; max-width:500px; padding:20px; max-height:70vh; overflow-y:auto; animation:slideUp 0.25s ease; }
        @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
        .popup-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 16px; }
        .popup-title { font-family:'Space Mono',monospace; font-size:11px; color:var(--neon); letter-spacing:2px; margin-bottom:16px; font-weight:700; }
        .popup-user-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
        .popup-avatar { width:32px; height:32px; border-radius:50%; background:var(--card2); border:1px solid var(--neon); display:flex; align-items:center; justify-content:center; font-size:11px; font-family:'Space Mono',monospace; color:var(--neon); font-weight:700; overflow:hidden; }
        .popup-avatar img { width:100%; height:100%; object-fit:cover; }
        .popup-username { font-size:13px; font-weight:600; }

        /* PROFILE */
        .profile-sheet { background:var(--card); border-radius:24px 24px 0 0; border:1px solid var(--border); width:100%; max-width:500px; max-height:85vh; overflow-y:auto; animation:slideUp 0.25s ease; }
        .profile-cover { width:100%; height:140px; background:linear-gradient(135deg,#001a0d,#00ff8820); position:relative; overflow:hidden; }
        .profile-cover img { width:100%; height:100%; object-fit:cover; }
        .profile-cover-edit { position:absolute; bottom:8px; right:8px; background:rgba(0,0,0,0.6); border:none; color:white; border-radius:8px; padding:4px 10px; font-size:10px; cursor:pointer; font-family:'Space Mono',monospace; }
        .profile-body { padding:0 20px 20px; }
        .profile-avatar-big { width:72px; height:72px; border-radius:50%; background:var(--card2); border:3px solid var(--neon); display:flex; align-items:center; justify-content:center; font-size:28px; font-family:'Space Mono',monospace; color:var(--neon); font-weight:700; margin-top:-36px; margin-bottom:10px; overflow:hidden; position:relative; cursor:pointer; }
        .profile-avatar-big img { width:100%; height:100%; object-fit:cover; }
        .profile-avatar-edit { position:absolute; bottom:0; right:0; background:var(--neon); color:#000; border-radius:50%; width:20px; height:20px; font-size:10px; display:flex; align-items:center; justify-content:center; }
        .profile-name { font-family:'Space Mono',monospace; font-size:14px; color:var(--neon); font-weight:700; margin-bottom:4px; }
        .profile-bio { font-size:12px; color:var(--muted); margin-bottom:4px; line-height:1.5; }
        .profile-link { font-size:11px; color:var(--neon); text-decoration:none; }
        .profile-stats { display:flex; justify-content:flex-start; gap:24px; margin:14px 0; }
        .profile-stat { text-align:center; }
        .profile-stat-num { font-family:'Space Mono',monospace; font-size:16px; font-weight:700; color:var(--neon); }
        .profile-stat-label { font-size:9px; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:1px; }
        .profile-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:3px; }
        .profile-grid-item { aspect-ratio:1; overflow:hidden; background:var(--card2); border-radius:4px; position:relative; }
        .profile-grid-item img,.profile-grid-item video { width:100%; height:100%; object-fit:cover; }
        .profile-grid-item .saved-badge { position:absolute; top:4px; right:4px; font-size:12px; }

        /* NOTIFICATIONS */
        .notif-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
        .notif-icon { width:36px; height:36px; border-radius:50%; background:var(--card2); display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
        .notif-text { font-size:12px; line-height:1.5; flex:1; }
        .notif-text strong { color:var(--neon); font-family:'Space Mono',monospace; font-size:11px; }

        /* CHAT LIST */
        .chat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:border-color 0.2s; }
        .chat-card:active { border-color:var(--neon); }
        .chat-card-name { font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; }
        .chat-card-sub { font-size:10px; color:var(--muted); margin-top:3px; font-family:'Space Mono',monospace; }

        /* CHAT SCREEN */
        .chat-screen { position:fixed; top:0; left:0; right:0; bottom:0; background:var(--bg); z-index:2000; display:none; flex-direction:column; }
        .chat-screen.open { display:flex; }
        .chat-header { display:flex; align-items:center; gap:14px; padding:16px; border-bottom:1px solid var(--border); background:var(--bg); flex-shrink:0; }
        .chat-header-name { font-family:'Space Mono',monospace; font-size:12px; color:var(--neon); font-weight:700; letter-spacing:2px; }
        .chat-status-txt { font-size:9px; color:var(--muted); font-family:'Space Mono',monospace; }
        #chatMessages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; -webkit-overflow-scrolling:touch; }
        .bubble { padding:10px 14px; border-radius:16px; font-size:13px; max-width:78%; word-wrap:break-word; line-height:1.5; position:relative; }
        .bubble-me { background:var(--neon); color:#000; align-self:flex-end; border-bottom-right-radius:4px; font-weight:600; }
        .bubble-them { background:var(--card2); color:inherit; align-self:flex-start; border:1px solid var(--border); border-bottom-left-radius:4px; }
        .bubble-sending { opacity:0.5; }
        .bubble-meta { font-size:9px; color:var(--muted); font-family:'Space Mono',monospace; text-align:right; margin-top:2px; align-self:flex-end; }

        /* TYPING INDICATOR */
        .typing-indicator { align-self:flex-start; background:var(--card2); border:1px solid var(--border); border-radius:16px; border-bottom-left-radius:4px; padding:12px 16px; display:none; }
        .typing-indicator.visible { display:flex; gap:4px; align-items:center; }
        .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); animation:typingBounce 1.2s infinite; }
        .typing-dot:nth-child(2) { animation-delay:0.2s; }
        .typing-dot:nth-child(3) { animation-delay:0.4s; }
        @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

        /* MESSAGE REACTIONS */
        .msg-reactions { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
        .msg-reaction-pill { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2px 8px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:4px; }
        .msg-reaction-pill span { font-size:10px; font-family:'Space Mono',monospace; color:var(--muted); }
        .reaction-picker { position:absolute; bottom:100%; right:0; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:8px 12px; display:none; gap:8px; z-index:10; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
        .reaction-picker.open { display:flex; }
        .reaction-opt { font-size:20px; cursor:pointer; transition:transform 0.15s; }
        .reaction-opt:active { transform:scale(1.3); }

        /* VOICE MESSAGE */
        .voice-bubble { display:flex; align-items:center; gap:10px; padding:10px 14px; min-width:160px; }
        .voice-play-btn { width:34px; height:34px; border-radius:50%; border:none; background:rgba(0,0,0,0.2); color:inherit; font-size:14px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        .bubble-me .voice-play-btn { background:rgba(0,0,0,0.2); }
        .voice-waveform { flex:1; height:32px; display:flex; align-items:center; gap:2px; }
        .voice-bar { width:3px; border-radius:2px; background:currentColor; opacity:0.5; }
        .voice-duration { font-size:10px; font-family:'Space Mono',monospace; opacity:0.7; }

        /* REPLY BUBBLE */
        .reply-bubble { width:100%; border-radius:16px; overflow:hidden; border:1px solid var(--border); align-self:flex-end; flex-shrink:0; }
        .reply-bubble.them { align-self:flex-start; }
        .reply-preview { background:var(--card2); border-bottom:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
        .reply-thumb { width:100%; height:260px; min-height:260px; max-height:260px; object-fit:cover; display:block; background:#111; flex-shrink:0; }
        .reply-post-info { padding:8px 12px; }
        .reply-post-label { font-size:9px; color:var(--muted); font-family:'Space Mono',monospace; letter-spacing:1px; }
        .reply-post-user { font-size:11px; color:var(--neon); font-family:'Space Mono',monospace; font-weight:700; }
        .reply-text-bubble { padding:10px 14px; font-size:13px; line-height:1.5; word-wrap:break-word; }
        .reply-bubble .reply-text-bubble { background:var(--neon); color:#000; font-weight:600; }
        .reply-bubble.them .reply-text-bubble { background:var(--card2); color:inherit; }

        /* REPLY BAR */
        #replyBar { display:none; padding:8px 16px; background:var(--card2); border-top:1px solid var(--border); border-bottom:1px solid var(--neon); flex-shrink:0; align-items:center; gap:10px; }
        #replyBar.visible { display:flex; }
        .reply-bar-thumb { width:32px; height:32px; border-radius:6px; object-fit:cover; flex-shrink:0; }
        .reply-bar-info { flex:1; min-width:0; }
        .reply-bar-label { font-size:9px; color:var(--neon); font-family:'Space Mono',monospace; letter-spacing:1px; }
        .reply-bar-user { font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .reply-bar-cancel { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; flex-shrink:0; }

        .chat-input-row { display:flex; gap:8px; padding:12px 16px; padding-bottom:calc(12px + env(safe-area-inset-bottom)); background:var(--bg); border-top:1px solid var(--border); flex-shrink:0; align-items:center; }
        .chat-input-row .input { margin-bottom:0; }
        .voice-record-btn { width:40px; height:40px; border-radius:50%; border:none; background:var(--card2); color:var(--muted); font-size:18px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:background 0.2s,color 0.2s; }
        .voice-record-btn.recording { background:#ff4444; color:white; animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }

        /* PEOPLE */
        .person-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:14px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }

        /* UPLOAD */
        .media-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
        .preview-box { width:100%; border-radius:12px; overflow:hidden; background:var(--card2); border:1px solid var(--border); margin:14px 0; }
        .preview-box img,.preview-box video { width:100%; display:block; max-height:300px; object-fit:cover; }
        .vault-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .vault-item { border-radius:14px; overflow:hidden; aspect-ratio:1; background:var(--card2); border:1px solid var(--border); position:relative; }
        .vault-item img,.vault-item video { width:100%; height:100%; object-fit:cover; }
        .vault-del { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.6); border:none; color:#ff4444; border-radius:50%; width:26px; height:26px; font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; }

        /* FEED SEARCH */
        .feed-search { display:flex; gap:8px; margin-bottom:16px; }
        .feed-search .input { margin-bottom:0; }

        /* PULL TO REFRESH */
        #pullIndicator { text-align:center; padding:10px; font-size:10px; color:var(--neon); font-family:'Space Mono',monospace; letter-spacing:2px; display:none; }

        .tag { display:inline-block; background:#00ff8815; color:var(--neon); border:1px solid #00ff8830; border-radius:6px; padding:3px 8px; font-size:9px; font-family:'Space Mono',monospace; letter-spacing:1px; }
        .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:11px; font-family:'Space Mono',monospace; letter-spacing:1px; }
        .spinner { width:20px; height:20px; border:2px solid var(--border); border-top-color:var(--neon); border-radius:50%; animation:spin 0.7s linear infinite; margin:20px auto; }
        @keyframes spin { to{transform:rotate(360deg)} }
        select.input { appearance:none; }
        #toast { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card2); border:1px solid var(--neon); color:var(--neon); padding:10px 20px; border-radius:30px; font-size:11px; font-family:'Space Mono',monospace; letter-spacing:1px; z-index:9999; opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; white-space:nowrap; }
        #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* REPOST BADGE */
        .repost-badge { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; padding:6px 16px 0; display:flex; align-items:center; gap:4px; }
    </style>
</head>
<body>

</nav>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwknSutmwt8-r3qz3X14HHS__fEXZNxulPSCebG3OA7s2VNQkPUvaEpGPpNBJT7sdR/exec";
const CLOUD_URL  = "https://api.cloudinary.com/v1_1/ddrpctqpl/auto/upload";
const PRESET     = "lapp_reset";
const REACTIONS  = ['❤️','😂','😮','😢','🔥','👏'];
const STORY_DURATION = 5000; // 5 seconds per story

let currentUser    = null;
let activeChatWith = null;
let syncTimer      = null;
let pendingFile    = null;
let pendingPreviewUrl = null;
let knownMsgIds    = new Set();
let isSendingMsg   = false;
let replyingToPost = null;
let myConnections  = new Set();
let cachedPosts    = [];
let savedPosts     = new Set(JSON.parse(localStorage.getItem('lapp_saved') || '[]'));
let isRecordingVoice = false;
let mediaRecorder  = null;
let voiceChunks    = [];
let typingTimer    = null;
let storyGroups    = [];
let currentStoryGroup = 0;
let currentStoryIdx   = 0;
let storyTimer        = null;
let onlineUsers       = new Set();

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
    const u = localStorage.getItem('lapp_user');
    if (u) { currentUser = u; loginSuccess(); }
    if (localStorage.getItem('lapp_theme') === 'light') document.body.classList.add('light');
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js').then(reg => reg.update()).catch(()=>{});
        navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.update()));
    }
    setupPullToRefresh();
})();

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
    document.body.classList.toggle('light');
    const isLight = document.body.classList.contains('light');
    localStorage.setItem('lapp_theme', isLight ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isLight ? '☀️' : '🌙';
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function handleLogin() {
    const name = document.getElementById('usernameInput').value.trim().toLowerCase().replace(/\s+/g,'');
    const pass = document.getElementById('passwordInput').value.trim();
    if (!name || !pass) { toast('Enter username and password'); return; }
    localStorage.setItem('lapp_user', name);
    localStorage.setItem('lapp_pass', pass);
    currentUser = name;
    loginSuccess();
}

function loginSuccess() {
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('navbar').style.display = 'flex';
    document.getElementById('feedUsername').textContent = currentUser;
    document.getElementById('themeBtn').textContent = localStorage.getItem('lapp_theme') === 'light' ? '☀️' : '🌙';
    showPage('feedPage');
    setInterval(pollUnreadDot, 10000);
    setInterval(pollOnlineStatus, 15000);
    // Register with OneSignal
    if (window.OneSignalDeferred) {
        OneSignalDeferred.push(async function(OneSignal) {
            try {
                await OneSignal.Notifications.requestPermission();
                await OneSignal.login(currentUser.toLowerCase());
                // Also set external ID via the tag system as fallback
                OneSignal.User.addTag('username', currentUser.toLowerCase());
                console.log('[OneSignal] login done for:', currentUser);
            } catch(e) { console.warn('[OneSignal] error:', e.message); }
        });
    }
    // Mark user as online
    apiPost({ action:'setOnline', user:currentUser });
}

// ── ONLINE STATUS ─────────────────────────────────────────────────────────────
async function pollOnlineStatus() {
    if (!currentUser) return;
    try {
        await apiPost({ action:'setOnline', user:currentUser });
        const data = await apiGet();
        onlineUsers.clear();
        (data.online || []).forEach(u => onlineUsers.add(String(u).toLowerCase()));
    } catch(e) {}
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiPost(body) {
    try {
        await fetch(SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(body) });
        return true;
    } catch(e) { return false; }
}

async function apiGet() {
    if (!currentUser) return { posts:[], messages:[], requests:[] };
    const res = await fetch(SCRIPT_URL + '?t=' + Date.now() + '&user=' + encodeURIComponent(currentUser));
    if (!res.ok && res.status !== 0) throw new Error('Network error');
    const data = await res.json();
    if (data.posts && currentUser) {
        const connections = buildConnections(data.requests || []);
        const allowed = new Set([...connections, currentUser.toLowerCase()]);
        data.posts = data.posts.filter(p => {
            const pu = String(p.username || '').trim().toLowerCase();
            if (p.visibility === 'private') return pu === currentUser.toLowerCase();
            if (p.visibility === 'story') return allowed.has(pu);
            return allowed.has(pu);
        });
    }
    return data;
}

async function pollUnreadDot() {
    if (!currentUser) return;
    try {
        const data = await apiGet();
        const seenPerSender = JSON.parse(localStorage.getItem('lapp_seen_per') || '{}');
        const totalPerSender = {};
        (data.messages||[]).forEach(m => {
            if (String(m.receiver).trim().toLowerCase() !== currentUser.toLowerCase()) return;
            if (m.status === 'comment') return;
            const sender = String(m.sender).trim().toLowerCase();
            totalPerSender[sender] = (totalPerSender[sender] || 0) + 1;
        });
        const hasUnread = Object.keys(totalPerSender).some(s => totalPerSender[s] > (seenPerSender[s] || 0));
        document.getElementById('chatDot').style.display = hasUnread ? 'block' : 'none';
    } catch(e) {}
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    const navEl = document.getElementById('nav-' + id.replace('Page',''));
    if (navEl) navEl.classList.add('active');
    clearInterval(syncTimer);
    if (id === 'feedPage')   loadFeed();
    if (id === 'vaultPage')  loadVault();
    if (id === 'chatPage')   { loadChatList(); syncTimer = setInterval(loadChatList, 5000); }
    if (id === 'peoplePage') loadSocial();
    if (id === 'uploadPage') resetUploadForm();
}

// ── PULL TO REFRESH ───────────────────────────────────────────────────────────
function setupPullToRefresh() {
    let startY = 0, pulling = false;
    const feedEl = document.getElementById('feedPage');
    feedEl.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive:true });
    feedEl.addEventListener('touchmove', e => {
        if (e.touches[0].clientY - startY > 60 && window.scrollY === 0) {
            pulling = true;
            document.getElementById('pullIndicator').style.display = 'block';
        }
    }, { passive:true });
    feedEl.addEventListener('touchend', () => {
        if (pulling) { pulling = false; document.getElementById('pullIndicator').style.display = 'none'; loadFeed(); }
    });
}

function filterFeed() {
    const term = document.getElementById('feedSearch').value.toLowerCase();
    document.querySelectorAll('.post-card').forEach(card => {
        const user = card.querySelector('.post-user');
        card.style.display = (!term || (user && user.textContent.toLowerCase().includes(term))) ? 'block' : 'none';
    });
}

function buildConnections(requests) {
    const connections = new Set();
    (requests || []).forEach(r => {
        if (String(r.status).trim() !== 'accepted') return;
        const sender   = String(r.sender   || '').trim().toLowerCase();
        const receiver = String(r.receiver || '').trim().toLowerCase();
        if (!sender || !receiver) return;
        if (sender   === currentUser.toLowerCase()) connections.add(receiver);
        if (receiver === currentUser.toLowerCase()) connections.add(sender);
    });
    return connections;
}

// ── STORIES ───────────────────────────────────────────────────────────────────
function renderStories(posts) {
    const bar = document.getElementById('storiesBar');
    const now = Date.now();
    const stories = posts.filter(p => p.visibility === 'story' && (now - new Date(p.time).getTime()) < 86400000);

    // Group by user
    const groups = {};
    stories.forEach(p => {
        const u = String(p.username).trim().toLowerCase();
        if (!groups[u]) groups[u] = [];
        groups[u].push(p);
    });

    storyGroups = Object.entries(groups);

    const seenStories = JSON.parse(localStorage.getItem('lapp_seen_stories') || '{}');
    const myStory = storyGroups.find(([u]) => u === currentUser.toLowerCase());

    let html = `<div style="flex-shrink:0;text-align:center;" onclick="triggerStoryUpload()">
        <div class="story-add">＋</div>
        <div class="story-label">Your Story</div>
    </div>`;

    storyGroups.forEach(([username, userStories], idx) => {
        const avatar = localStorage.getItem('lapp_avatar_' + username) || '';
        const avatarHtml = avatar
            ? `<img src="${escHtml(avatar)}" alt="">`
            : escHtml(username.slice(0,1).toUpperCase());
        const allSeen = userStories.every(s => seenStories[s.url]);
        html += `<div class="story-item" onclick="openStoryGroup(${idx})">
            <div class="story-ring ${allSeen ? 'seen' : ''}">
                <div class="story-avatar">${avatarHtml}</div>
            </div>
            <div class="story-label">@${escHtml(username)}</div>
        </div>`;
    });

    bar.innerHTML = html;
}

function triggerStoryUpload() {
    document.getElementById('postVis').value = 'story';
    showPage('uploadPage');
}

function openStoryGroup(groupIdx) {
    currentStoryGroup = groupIdx;
    currentStoryIdx   = 0;
    showStory();
    document.getElementById('storyViewer').classList.add('open');
}

let storyPaused = false;
let storyPauseRemaining = 0;
let storyPauseStart = 0;

function pauseStory() {
    if (storyPaused) return;
    storyPaused = true;
    clearTimeout(storyTimer);
    storyPauseStart = Date.now();
    // Pause progress bar animation
    const fill = document.getElementById('spf_' + currentStoryIdx);
    if (fill) {
        const computed = window.getComputedStyle(fill);
        const w = computed.width;
        const totalW = fill.parentElement.offsetWidth;
        const pct = (parseFloat(w) / totalW) * 100;
        fill.style.transition = 'none';
        fill.style.width = pct + '%';
    }
    // Pause video if playing
    const vid = document.querySelector('#storyMediaWrap video');
    if (vid) vid.pause();
}

function resumeStory() {
    if (!storyPaused) return;
    storyPaused = false;
    const vid = document.querySelector('#storyMediaWrap video');
    if (vid) {
        vid.play();
        return; // video ended event handles next
    }
    // Resume countdown for images
    const elapsed = Date.now() - storyPauseStart;
    const remaining = Math.max(0, (storyPauseRemaining || STORY_DURATION) - elapsed);
    const fill = document.getElementById('spf_' + currentStoryIdx);
    if (fill) {
        fill.style.transition = 'width ' + remaining + 'ms linear';
        fill.style.width = '100%';
    }
    storyTimer = setTimeout(nextStory, remaining);
}

function showStory() {
    const [username, stories] = storyGroups[currentStoryGroup];
    const story = stories[currentStoryIdx];
    if (!story) { closeStoryViewer(); return; }
    storyPaused = false;

    const seenStories = JSON.parse(localStorage.getItem('lapp_seen_stories') || '{}');
    seenStories[story.url] = true;
    localStorage.setItem('lapp_seen_stories', JSON.stringify(seenStories));

    // Register view locally and on server
    const storyViews = JSON.parse(localStorage.getItem('lapp_story_views') || '{}');
    if (!storyViews[story.url]) storyViews[story.url] = [];
    if (!storyViews[story.url].map(u=>u.toLowerCase()).includes(currentUser.toLowerCase())) {
        storyViews[story.url].push(currentUser);
        localStorage.setItem('lapp_story_views', JSON.stringify(storyViews));
    }
    document.getElementById('storyViewCount').textContent = (storyViews[story.url] || []).length;
    apiPost({ action:'storyView', viewer:currentUser, storyUrl:story.url, storyOwner:username });

    // Update like state
    const storyLikes = JSON.parse(localStorage.getItem('lapp_story_likes') || '{}');
    const likers = storyLikes[story.url] || [];
    const iLiked = likers.map(u=>u.toLowerCase()).includes(currentUser.toLowerCase());
    document.getElementById('storyLikeIcon').textContent = iLiked ? '❤️' : '🤍';
    document.getElementById('storyLikeCount').textContent = likers.length;

    // Show/hide views button (owner only) — reuse storyViews already declared above
    const isOwner = username === currentUser.toLowerCase();
    const viewsBtn = document.getElementById('storyViewsBtn');
    viewsBtn.style.display = isOwner ? 'flex' : 'none';
    document.getElementById('storyViewCount').textContent = (storyViews[story.url] || []).length;

    // Hide who panel when switching stories
    document.getElementById('storyWhoPanel').classList.remove('open');
    document.getElementById('storyReplyInput').value = '';

    // Progress bar
    const bar = document.getElementById('storyProgressBar');
    bar.innerHTML = stories.map((_, i) => `<div class="story-progress-seg"><div class="story-progress-fill" id="spf_${i}"></div></div>`).join('');

    // Fill past segments
    for (let i = 0; i < currentStoryIdx; i++) {
        const el = document.getElementById('spf_' + i);
        if (el) el.style.width = '100%';
    }

    // Animate current
    clearTimeout(storyTimer);
    const fill = document.getElementById('spf_' + currentStoryIdx);
    if (fill) { fill.style.transition = `width ${STORY_DURATION}ms linear`; setTimeout(() => fill.style.width = '100%', 50); }

    // Header
    const avatar = localStorage.getItem('lapp_avatar_' + username) || '';
    document.getElementById('storyViewerAvatar').innerHTML = avatar
        ? `<img src="${escHtml(avatar)}" alt="">`
        : escHtml(username.slice(0,1).toUpperCase());
    document.getElementById('storyViewerUsername').textContent = '@' + username;
    document.getElementById('storyViewerTime').textContent = timeAgo(story.time);

    // Show delete button only for own stories
    const existingDel = document.getElementById('storyDeleteBtn');
    if (existingDel) existingDel.remove();
    if (username === currentUser.toLowerCase()) {
        const delBtn = document.createElement('button');
        delBtn.id = 'storyDeleteBtn';
        delBtn.textContent = '🗑️';
        delBtn.style.cssText = 'background:none;border:none;color:rgba(255,80,80,0.9);font-size:20px;cursor:pointer;padding:4px 8px;margin-right:8px;';
        delBtn.onclick = async () => {
            if (!confirm('Delete this story?')) return;
            await apiPost({ action:'deletePost', user:currentUser, url:story.url });
            toast('Story deleted');
            // Remove from storyGroups
            const [, stories] = storyGroups[currentStoryGroup];
            stories.splice(currentStoryIdx, 1);
            if (stories.length === 0) {
                storyGroups.splice(currentStoryGroup, 1);
                if (storyGroups.length === 0) { closeStoryViewer(); return; }
                currentStoryGroup = Math.min(currentStoryGroup, storyGroups.length - 1);
                currentStoryIdx = 0;
            } else {
                currentStoryIdx = Math.min(currentStoryIdx, stories.length - 1);
            }
            showStory();
        };
        // Insert before close button
        const closeBtn = document.querySelector('.story-close');
        closeBtn.parentNode.insertBefore(delBtn, closeBtn);
    }

    // Media
    const wrap = document.getElementById('storyMediaWrap');
    const isVideo = story.type === 'video' || /\.(mp4|mov|webm)$/i.test(story.url);
    const tapLeft  = wrap.querySelector('.story-tap-left');
    const tapRight = wrap.querySelector('.story-tap-right');

    // Stop and remove old media — kill audio too
    wrap.querySelectorAll('video').forEach(v => { v.pause(); v.src = ''; v.load(); });
    wrap.querySelectorAll('img,video,.story-caption-overlay').forEach(el => el.remove());

    const media = document.createElement(isVideo ? 'video' : 'img');
    media.src = story.url;
    if (isVideo) {
        media.autoplay = true;
        media.muted = false;
        media.playsInline = true;
        media.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;';
        // Use actual video duration for progress bar
        media.addEventListener('loadedmetadata', () => {
            clearTimeout(storyTimer);
            const dur = Math.max(media.duration * 1000, 1000);
            const fill = document.getElementById('spf_' + currentStoryIdx);
            if (fill) {
                fill.style.transition = 'none';
                fill.style.width = '0%';
                setTimeout(() => { fill.style.transition = 'width ' + dur + 'ms linear'; fill.style.width = '100%'; }, 50);
            }
            storyTimer = setTimeout(nextStory, dur);
        });
        media.addEventListener('ended', () => { clearTimeout(storyTimer); nextStory(); });
    } else {
        storyTimer = setTimeout(nextStory, STORY_DURATION);
    }
    wrap.insertBefore(media, tapLeft);

    if (story.caption) {
        const cap = document.createElement('div');
        cap.className = 'story-caption-overlay';
        cap.textContent = story.caption;
        wrap.insertBefore(cap, tapLeft);
    }
}

function nextStory() {
    const [, stories] = storyGroups[currentStoryGroup];
    if (currentStoryIdx < stories.length - 1) {
        currentStoryIdx++;
        showStory();
    } else if (currentStoryGroup < storyGroups.length - 1) {
        currentStoryGroup++;
        currentStoryIdx = 0;
        showStory();
    } else {
        closeStoryViewer();
    }
}

function prevStory() {
    if (currentStoryIdx > 0) { currentStoryIdx--; showStory(); }
    else if (currentStoryGroup > 0) { currentStoryGroup--; currentStoryIdx = 0; showStory(); }
}

function toggleStoryLike() {
    if (!storyGroups.length) return;
    const [username, stories] = storyGroups[currentStoryGroup];
    const story = stories[currentStoryIdx];
    if (!story) return;

    const storyLikes = JSON.parse(localStorage.getItem('lapp_story_likes') || '{}');
    const likers = storyLikes[story.url] || [];
    const iLiked = likers.map(u=>u.toLowerCase()).includes(currentUser.toLowerCase());

    if (iLiked) {
        storyLikes[story.url] = likers.filter(u => u.toLowerCase() !== currentUser.toLowerCase());
    } else {
        storyLikes[story.url] = [...likers, currentUser];
        // Notify story owner
        apiPost({ action:'storyLike', liker:currentUser, storyUrl:story.url, storyOwner:username });
    }
    localStorage.setItem('lapp_story_likes', JSON.stringify(storyLikes));

    const newLikers = storyLikes[story.url];
    const nowLiked = newLikers.map(u=>u.toLowerCase()).includes(currentUser.toLowerCase());
    document.getElementById('storyLikeIcon').textContent = nowLiked ? '❤️' : '🤍';
    document.getElementById('storyLikeCount').textContent = newLikers.length;

    // Animate
    document.getElementById('storyLikeBtn').style.transform = 'scale(1.4)';
    setTimeout(() => document.getElementById('storyLikeBtn').style.transform = 'scale(1)', 200);
}

function toggleStoryWhoPanel() {
    if (!storyGroups.length) return;
    const [username, stories] = storyGroups[currentStoryGroup];
    const story = stories[currentStoryIdx];
    if (!story) return;

    const panel = document.getElementById('storyWhoPanel');
    if (panel.classList.contains('open')) { panel.classList.remove('open'); return; }

    const storyLikes = JSON.parse(localStorage.getItem('lapp_story_likes') || '{}');
    const storyViews = JSON.parse(localStorage.getItem('lapp_story_views') || '{}');
    const likers  = storyLikes[story.url] || [];
    const viewers = storyViews[story.url] || [];

    let html = '';
    if (viewers.length) {
        html += `<div style="font-size:9px;color:var(--neon);font-family:'Space Mono',monospace;letter-spacing:2px;margin-bottom:8px;">👁 VIEWED BY</div>`;
        html += viewers.map(u => `<div class="story-who-item">
            <div style="width:28px;height:28px;border-radius:50%;background:#222;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--neon);">
                ${escHtml(String(u).slice(0,1).toUpperCase())}
            </div>
            @${escHtml(u)} ${likers.map(l=>l.toLowerCase()).includes(String(u).toLowerCase()) ? '❤️' : ''}
        </div>`).join('');
    }
    if (!viewers.length && !likers.length) html = '<div style="font-size:11px;color:rgba(255,255,255,0.4);text-align:center;padding:10px;">No views yet</div>';

    panel.innerHTML = html;
    panel.classList.add('open');
    pauseStory();
}

async function sendStoryReply() {
    const input = document.getElementById('storyReplyInput');
    const text  = input.value.trim();
    if (!text || !storyGroups.length) return;

    const [username] = storyGroups[currentStoryGroup];
    const story = storyGroups[currentStoryGroup][1][currentStoryIdx];
    if (!story) return;

    input.value = '';
    input.blur();

    // Send as DM with story reference
    await apiPost({
        action: 'sendDM',
        sender: currentUser,
        receiver: username,
        text,
        postUrl: story.url,
        postType: story.type || 'photo',
        postUsername: username,
        msgtype: 'story_reply'
    });

    toast('Reply sent to @' + username + ' ✓');
    // Open chat with that person
    closeStoryViewer();
    showPage('chatPage');
    setTimeout(() => openPrivateChat(username), 300);
}

function closeStoryViewer() {
    clearTimeout(storyTimer);
    storyPaused = false;
    // Kill any playing video audio
    document.querySelectorAll('#storyMediaWrap video').forEach(v => { v.pause(); v.src = ''; v.load(); });
    document.getElementById('storyViewer').classList.remove('open');
    document.getElementById('storyWhoPanel').classList.remove('open');
    document.getElementById('storyReplyInput').value = '';
    renderStories(cachedPosts);
}

// ── FEED ──────────────────────────────────────────────────────────────────────
async function loadFeed() {
    const container = document.getElementById('feedItems');
    container.innerHTML = '<div class="spinner"></div>';
    try {
        const data = await apiGet();
        cachedPosts = data.posts || [];
        myConnections = buildConnections(data.requests);
        const allowedUsers = new Set([...myConnections, currentUser.toLowerCase()]);
        const now = Date.now();

        // Stories
        renderStories(cachedPosts);

        const posts = cachedPosts
            .filter(p => {
                if (p.visibility === 'story') return false; // shown in stories bar
                if (p.visibility === 'private') return false;
                if (!allowedUsers.has(String(p.username).trim().toLowerCase())) return false;
                // Check expiry (24hr posts)
                if (p.expiry === 'true' || p.expiry === true) {
                    if ((now - new Date(p.time).getTime()) > 86400000) return false;
                }
                return true;
            })
            .reverse();

        checkNotifications(data);

        if (!posts.length) {
            container.innerHTML = '<div class="empty-state">NO POSTS YET<br><br><span style="font-size:9px;opacity:0.5;">Connect with people to see their posts</span></div>';
            return;
        }

        container.innerHTML = posts.map(p => renderPostCard(p, data.messages || [])).join('');
        setupViewObserver();
        setupDoubleTapLike();
    } catch(e) {
        container.innerHTML = '<div class="empty-state">FAILED TO LOAD</div>';
    }
}

function setupDoubleTapLike() {
    document.querySelectorAll('.post-card').forEach(card => {
        let lastTap = 0;
        const media = card.querySelector('.post-media');
        if (!media) return;
        media.addEventListener('touchend', () => {
            const now = Date.now();
            if (now - lastTap < 350) {
                const likeBtn = card.querySelector('.like-btn');
                if (likeBtn && !likeBtn.classList.contains('liked')) toggleLike(card.dataset.url, likeBtn);
                const heart = document.createElement('div');
                heart.textContent = '❤️';
                heart.style.cssText = 'position:absolute;font-size:60px;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:10;transition:all 0.4s ease;';
                card.style.position = 'relative';
                card.appendChild(heart);
                requestAnimationFrame(() => { heart.style.transform = 'translate(-50%,-50%) scale(1.2)'; });
                setTimeout(() => { heart.style.opacity='0'; heart.style.transform='translate(-50%,-60%) scale(0.8)'; }, 300);
                setTimeout(() => heart.remove(), 700);
            }
            lastTap = now;
        });
    });
}

function renderPostCard(p, allMessages) {
    const isVideo  = p.type === 'video' || /\.(mp4|mov|webm|avi)$/i.test(p.url);
    const likeList = safeParseArr(p.likers || '[]');
    const viewList = safeParseArr(p.viewers || '[]');
    const liked    = likeList.map(u=>u.toLowerCase()).includes(currentUser.toLowerCase());
    const isSaved  = savedPosts.has(p.url);
    const safeUrl  = escHtml(p.url);
    const safeUser = escHtml(p.username);
    const caption  = p.caption ? escHtml(p.caption) : '';
    const isOwner  = String(p.username).trim().toLowerCase() === currentUser.toLowerCase();
    const isOther  = !isOwner && myConnections.has(String(p.username).trim().toLowerCase());
    const isOnline = onlineUsers.has(String(p.username).trim().toLowerCase());
    const isRepost = p.repostedBy && p.repostedBy !== p.username;

    const postComments = allMessages.filter(m => {
        const pu = m.attached_media || m.posturl || '';
        return m.status === 'comment' && pu === p.url;
    });

    const now = Date.now();
    const postAge = now - new Date(p.time).getTime();
    const isExpiring = (p.expiry === 'true' || p.expiry === true);
    const expiryHtml = isExpiring
        ? `<div class="post-expiry">⏳ Expires in ${Math.max(0, Math.round((86400000 - postAge) / 3600000))}h</div>`
        : '';

    const repostBadge = isRepost
        ? `<div class="repost-badge">🔁 Reposted by @${escHtml(p.repostedBy)}</div>`
        : '';

    const mediaEl = isVideo
        ? `<video src="${safeUrl}" class="post-media" controls playsinline muted data-url="${safeUrl}"></video>`
        : `<img src="${safeUrl}" class="post-media" loading="lazy" data-url="${safeUrl}">`;

    const onlineBadge = `<span class="${isOnline ? 'online-dot' : 'offline-dot'}"></span>`;

    const likeBtn = isOther
        ? `<button class="action-btn like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${safeUrl}', this)">
               <span class="action-icon">${liked ? '❤️' : '🤍'}</span>
               <span class="like-count">${likeList.length}</span>
           </button>`
        : `<button class="action-btn" onclick="showWhoList('${safeUrl}','likes')" style="${likeList.length?'':'cursor:default;'}">❤️ <span>${likeList.length}</span></button>`;

    const saveBtn = `<button class="action-btn ${isSaved ? 'saved' : ''}" onclick="toggleSave('${safeUrl}', this)" title="Save post">
        <span class="action-icon">🔖</span>
    </button>`;

    const repostBtn = isOther
        ? `<button class="action-btn" onclick="repostPost('${safeUrl}','${safeUser}')" title="Repost"><span class="action-icon">🔁</span></button>`
        : '';

    // Everyone can tap likes/views to see who — owner sees full list, others see count only
    const whoLikedBtn = '';

    const viewBtn = `<button class="action-btn" onclick="${isOwner ? `showWhoList('${safeUrl}','views')` : ''}" style="${isOwner?'':'cursor:default;'}margin-left:4px;"><span class="action-icon">👁</span><span>${viewList.length}</span></button>`;

    const commentBtn = (isOwner || isOther)
        ? `<button class="action-btn" onclick="toggleComments(this)" style="margin-left:auto;"><span class="action-icon">💬</span><span class="comment-count">${postComments.length}</span></button>`
        : `<span class="action-btn" style="cursor:default;opacity:0.3;margin-left:auto;">💬 ${postComments.length}</span>`;

    const replyBtn = isOther
        ? `<button class="action-btn" onclick="startPostReply('${safeUrl}','${isVideo?'video':'image'}','${safeUser}')"><span class="action-icon">↩️</span></button>`
        : '';

    const deleteBtn = isOwner
        ? `<button class="btn btn-danger btn-sm" onclick="deletePost('${safeUrl}')">DELETE</button>` : '';

    const commentsHtml = isOwner
        ? postComments.map(c => `<div class="comment-item">
            <div class="comment-avatar">${getAvatarHtml(c.sender)}</div>
            <div class="comment-body">
                <div class="comment-user">@${escHtml(c.sender||'')}</div>
                <div class="comment-text">${escHtml(c.text||'')}</div>
            </div></div>`).join('') : '';

    const commentInput = isOther
        ? `<div class="comment-input-row">
            <input type="text" class="input" placeholder="Add a comment..." onkeydown="if(event.key==='Enter')postComment('${safeUrl}',this)">
            <button class="btn btn-neon btn-sm" onclick="postComment('${safeUrl}',this.previousElementSibling)">POST</button>
           </div>` : '';

    return `<div class="post-card" data-url="${safeUrl}">
        ${repostBadge}
        <div class="post-header">
            <span class="post-user" onclick="showUserProfile('${safeUser}')">${onlineBadge} @${safeUser}</span>
            <div style="display:flex;gap:6px;align-items:center;">
                <span style="font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;">${timeAgo(p.time)}</span>
                ${deleteBtn}
            </div>
        </div>
        ${mediaEl}
        ${caption ? `<div class="post-caption">${caption}</div>` : ''}
        ${expiryHtml}
        <div class="post-actions">
            ${likeBtn}${whoLikedBtn}${viewBtn}${commentBtn}${replyBtn}${saveBtn}${repostBtn}
        </div>
        <div class="comments-section">
            <div class="comments-list">${commentsHtml}${isOwner && !postComments.length ? '<div style="font-size:10px;color:var(--muted);padding:4px 0;font-family:monospace;">NO COMMENTS YET</div>' : ''}</div>
            ${commentInput}
        </div>
    </div>`;
}

function getAvatarHtml(username) {
    const u = String(username||'').toLowerCase();
    const av = localStorage.getItem('lapp_avatar_' + u);
    return av ? `<img src="${escHtml(av)}" alt="">` : escHtml(String(username||'?').slice(0,1).toUpperCase());
}

function timeAgo(ts) {
    if (!ts) return '';
    const diff = Date.now() - new Date(ts).getTime();
    const m = Math.floor(diff/60000);
    if (m < 1)  return 'just now';
    if (m < 60) return m + 'm ago';
    const h = Math.floor(m/60);
    if (h < 24) return h + 'h ago';
    return Math.floor(h/24) + 'd ago';
}

function toggleComments(btn) {
    btn.closest('.post-card').querySelector('.comments-section').classList.toggle('open');
}

async function postComment(postUrl, inputEl) {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.disabled = true;
    await apiPost({ action:'postComment', sender:currentUser, postUrl, text, ts:Date.now() });
    inputEl.disabled = false;
    toast('Comment posted ✓');
    const card = document.querySelector(`.post-card[data-url="${CSS.escape(postUrl)}"]`);
    if (card) {
        const list = card.querySelector('.comments-list');
        const div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML = `<div class="comment-avatar">${getAvatarHtml(currentUser)}</div>
            <div class="comment-body"><div class="comment-user">@${escHtml(currentUser)}</div>
            <div class="comment-text">${escHtml(text)}</div></div>`;
        list.appendChild(div);
        const cnt = card.querySelector('.comment-count');
        if (cnt) cnt.textContent = parseInt(cnt.textContent||0) + 1;
    }
}

// ── SAVE / BOOKMARK ───────────────────────────────────────────────────────────
function toggleSave(postUrl, btn) {
    if (savedPosts.has(postUrl)) {
        savedPosts.delete(postUrl);
        btn.classList.remove('saved');
        toast('Removed from saved');
    } else {
        savedPosts.add(postUrl);
        btn.classList.add('saved');
        toast('Post saved 🔖');
    }
    localStorage.setItem('lapp_saved', JSON.stringify([...savedPosts]));
}

// ── REPOST ────────────────────────────────────────────────────────────────────
async function repostPost(postUrl, originalUser) {
    if (!confirm('Repost this to your feed?')) return;
    const post = cachedPosts.find(p => p.url === postUrl);
    if (!post) return;
    await apiPost({
        action: 'publicUpload',
        username: currentUser,
        type: post.type || 'photo',
        url: postUrl,
        visibility: 'public',
        caption: post.caption || '',
        repostedBy: currentUser,
        originalUser
    });
    toast('Reposted! 🔁');
    loadFeed();
}

// ── LIKES ─────────────────────────────────────────────────────────────────────
async function toggleLike(postUrl, btn) {
    const isLiked = btn.classList.contains('liked');
    const iconEl  = btn.querySelector('.action-icon');
    const countEl = btn.querySelector('.like-count') || btn.querySelector('span:last-child');
    btn.classList.toggle('liked');
    iconEl.textContent = isLiked ? '🤍' : '❤️';
    if (countEl) countEl.textContent = Math.max(0, parseInt(countEl.textContent||0) + (isLiked ? -1 : 1));
    await apiPost({ action: isLiked ? 'unlikePost' : 'likePost', user:currentUser, url:postUrl });
}

// ── VIEWS ─────────────────────────────────────────────────────────────────────
function setupViewObserver() {
    if (!('IntersectionObserver' in window)) return;
    const obs = new IntersectionObserver(entries => {
        entries.forEach(e => {
            if (e.isIntersecting) {
                const url = e.target.dataset.url;
                if (url) apiPost({ action:'registerView', user:currentUser, url });
                obs.unobserve(e.target);
            }
        });
    }, { threshold:0.5 });
    document.querySelectorAll('.post-card').forEach(c => obs.observe(c));
}

// ── WHO LIKED/VIEWED ──────────────────────────────────────────────────────────
async function showWhoList(postUrl, type) {
    document.getElementById('popupTitle').textContent = type === 'likes' ? '❤️  LIKED BY' : '👁  VIEWED BY';
    document.getElementById('popupList').innerHTML = '<div class="spinner"></div>';
    document.getElementById('popupOverlay').classList.add('open');
    try {
        const data = await apiGet();
        const post = (data.posts||[]).find(p => p.url === postUrl);
        if (!post) { document.getElementById('popupList').innerHTML = '<div class="empty-state">NOT FOUND</div>'; return; }
        const list = safeParseArr(type === 'likes' ? (post.likers||'[]') : (post.viewers||'[]'));
        document.getElementById('popupList').innerHTML = list.length
            ? list.map(u => `<div class="popup-user-row">
                <div class="popup-avatar">${getAvatarHtml(u)}</div>
                <div class="popup-username">@${escHtml(u)}</div>
              </div>`).join('')
            : `<div class="empty-state">${type==='likes'?'NO LIKES YET':'NO VIEWS YET'}</div>`;
    } catch(e) { document.getElementById('popupList').innerHTML = '<div class="empty-state">FAILED TO LOAD</div>'; }
}

function closePopup(e) {
    if (e.target === document.getElementById('popupOverlay')) document.getElementById('popupOverlay').classList.remove('open');
}

// ── PROFILE ───────────────────────────────────────────────────────────────────
function showMyProfile() { showUserProfile(currentUser); }

function showUserProfile(username) {
    const u = String(username).replace('@','').toLowerCase();
    const isMe = u === currentUser.toLowerCase();
    const isAllowed = isMe || myConnections.has(u);
    const posts = isAllowed

        : [];

    const totalViews = posts.reduce((s,p) => s + safeParseArr(p.viewers||'[]').length, 0);
    const bio  = localStorage.getItem('lapp_bio_'  + u) || '';
    const link = localStorage.getItem('lapp_link_' + u) || '';
    const avatar = localStorage.getItem('lapp_avatar_' + u) || '';

    const coverEl = document.getElementById('profileCover');
    coverEl.style.background = cover ? 'none' : 'linear-gradient(135deg,#001a0d,#00ff8820)';

    else { linkEl.style.display = 'none'; }

    const actionEl = document.getElementById('profileActionBtn');
    if (isMe) {
        actionEl.innerHTML = `<button class="btn btn-ghost btn-sm" onclick="editProfile()">✏️ Edit Profile</button>`;
    } else {

            : `<button class="btn btn-neon btn-sm" onclick="quickFollow('${escHtml(u)}')">+ Follow</button>`;
    }

    document.getElementById('profileGrid').innerHTML = isAllowed
        ? posts.slice(0,9).map(p => {
            const isVid = p.type==='video'||/\.(mp4|mov|webm|avi)$/i.test(p.url);

let seenNotifCount = parseInt(localStorage.getItem('lapp_seen_notifs') || '0');

function checkNotifications(data) {
    const notifs = buildNotifications(data);
    if (notifs.length > seenNotifCount) document.getElementById('notifDot').style.display = 'block';
}

function buildNotifications(data) {
    const notifs = [];
    const myPosts = (data.posts||[]).filter(p => String(p.username).trim().toLowerCase() === currentUser.toLowerCase());
    myPosts.forEach(p => {
        safeParseArr(p.likers||'[]').forEach(u => {
            if (u.toLowerCase() !== currentUser.toLowerCase()) notifs.push({ type:'like', user:u, postUrl:p.url, time:p.time });
        });
        (data.messages||[]).filter(m => (m.attached_media||m.posturl||'') === p.url && m.status==='comment')
            .forEach(m => notifs.push({ type:'comment', user:m.sender, text:m.text, time:m.timestamp }));
    });
    (data.requests||[])
        .filter(r => String(r.receiver).trim().toLowerCase() === currentUser.toLowerCase() && r.status==='pending')
        .forEach(r => notifs.push({ type:'request', user:r.sender, time:'' }));
    return notifs;
}

async function showNotifications() {
    document.getElementById('notifDot').style.display = 'none';
    document.getElementById('notifList').innerHTML = '<div class="spinner"></div>';
    document.getElementById('notifOverlay').classList.add('open');
    try {
        const data = await apiGet();
        const notifs = buildNotifications(data);
        seenNotifCount = notifs.length;
        localStorage.setItem('lapp_seen_notifs', notifs.length);
        if (!notifs.length) { document.getElementById('notifList').innerHTML = '<div class="empty-state">NO NOTIFICATIONS YET</div>'; return; }
        document.getElementById('notifList').innerHTML = notifs.reverse().slice(0,30).map(n => {
            let icon='🔔', text='';
            if (n.type==='like')    { icon='❤️'; text=`<strong>@${escHtml(n.user)}</strong> liked your post`; }
            if (n.type==='comment') { icon='💬'; text=`<strong>@${escHtml(n.user)}</strong> commented: ${escHtml(n.text||'')}`; }
            if (n.type==='request') { icon='👥'; text=`<strong>@${escHtml(n.user)}</strong> sent you a follow request`; }
            return `<div class="notif-item"><div class="notif-icon">${icon}</div><div class="notif-text">${text}</div></div>`;
        }).join('');
    } catch(e) { document.getElementById('notifList').innerHTML = '<div class="empty-state">FAILED TO LOAD</div>'; }
}

// ── UPLOAD ────────────────────────────────────────────────────────────────────
function triggerCapture(accept, captureMode) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = accept;
    if (captureMode) input.capture = captureMode;
    input.onchange = async e => {
        const file = e.target.files[0]; if (!file) return;
        const isVideo = file.type.startsWith('video');
        const previewUrl = URL.createObjectURL(file);
        document.getElementById('previewBox').innerHTML = isVideo
            ? `<video src="${previewUrl}" controls muted playsinline></video>`
            : `<img src="${previewUrl}">`;
        document.getElementById('previewArea').style.display = 'block';
        pendingFile = file; pendingPreviewUrl = previewUrl;
        if (!isVideo) { const mb=(file.size/1024/1024).toFixed(1); if(mb>1) toast(`${mb}MB — will compress`); }
    };
    input.click();
}

function compressImage(file, maxDim=1200, quality=0.82) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        const objUrl = URL.createObjectURL(file);
        img.onload = () => {
            URL.revokeObjectURL(objUrl);
            let { width, height } = img;
            if (width > maxDim || height > maxDim) {
                if (width > height) { height = Math.round(height*maxDim/width); width=maxDim; }
                else { width = Math.round(width*maxDim/height); height=maxDim; }
            }
            const canvas = document.createElement('canvas');
            canvas.width=width; canvas.height=height;
            canvas.getContext('2d').drawImage(img,0,0,width,height);
            canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('Compression failed')), 'image/jpeg', quality);
        };
        img.onerror = reject; img.src = objUrl;
    });
}

function xhrUpload(url, formData, onProgress) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('POST', url);
        xhr.upload.onprogress = e => { if (e.lengthComputable) onProgress(e.loaded/e.total); };
        xhr.onload  = () => { try { resolve(JSON.parse(xhr.responseText)); } catch(e) { reject(new Error('Bad response')); } };
        xhr.onerror = () => reject(new Error('Network error'));
        xhr.send(formData);
    });
}

function setUploadProgress(pct, label) {
    document.getElementById('upBtn').textContent = label || `UPLOADING ${Math.round(pct*100)}%`;
}

function resetUploadForm() {
    const btn = document.getElementById('upBtn');
    btn.disabled = false; btn.textContent = 'UPLOAD POST';
    pendingFile = null;
    if (pendingPreviewUrl) { URL.revokeObjectURL(pendingPreviewUrl); pendingPreviewUrl = null; }
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('previewBox').innerHTML = '';
    document.getElementById('captionInput').value = '';
    document.getElementById('postVis').value = 'public';
}

async function uploadNow() {
    if (!pendingFile) { toast('No file selected'); return; }
    const btn = document.getElementById('upBtn');
    btn.disabled = true;
    const isVideo = pendingFile.type.startsWith('video');
    const vis = document.getElementById('postVis').value;

    try {
        let uploadBlob;
        if (isVideo) { uploadBlob = pendingFile; setUploadProgress(0,'PREPARING...'); }
        else {
            setUploadProgress(0,'COMPRESSING...');
            uploadBlob = await compressImage(pendingFile);
            const origMB=(pendingFile.size/1024/1024).toFixed(1), newMB=(uploadBlob.size/1024/1024).toFixed(1);
            if (origMB !== newMB) toast(`Compressed ${origMB}MB → ${newMB}MB`);
        }

        const fd = new FormData();
        fd.append('file', uploadBlob, isVideo ? pendingFile.name : 'photo.jpg');
        fd.append('upload_preset', PRESET);
        fd.append('quality', 'auto'); fd.append('fetch_format', 'auto');

        setUploadProgress(0,'UPLOADING 0%');
        const cData = await xhrUpload(CLOUD_URL, fd, p => setUploadProgress(p));
        if (!cData.secure_url) throw new Error(cData.error?.message || 'No URL returned');

        setUploadProgress(1,'SAVING...');
        const caption = document.getElementById('captionInput').value.trim();
        const is24hr  = vis === 'story'; // stories auto-expire

        await apiPost({
            action: 'publicUpload',
            username: currentUser,
            type: isVideo ? 'video' : 'photo',
            url: cData.secure_url,
            visibility: vis,
            caption,
            expiry: is24hr ? 'true' : 'false'
        });

        resetUploadForm();
        if (vis === 'private') { toast('Saved to vault! ✓'); showPage('vaultPage'); }
        else if (vis === 'story') { toast('Story posted! ✓'); showPage('feedPage'); }
        else { toast('Posted! ✓'); }
    } catch(e) {
        toast('Upload failed: ' + (e.message || 'unknown error'));
        btn.disabled = false; btn.textContent = 'UPLOAD POST';
    }
}

// ── CHAT LIST ─────────────────────────────────────────────────────────────────
async function loadChatList() {
    try {
        const data = await apiGet();
        const partners = new Set();
        (data.requests||[]).forEach(r => {
            if (r.status==='accepted') {
                if (String(r.sender).trim().toLowerCase()===currentUser.toLowerCase())   partners.add(r.receiver);
                if (String(r.receiver).trim().toLowerCase()===currentUser.toLowerCase()) partners.add(r.sender);
            }
        });

        const seenPerSender = JSON.parse(localStorage.getItem('lapp_seen_per') || '{}');
        const unreadPerSender = {};
        (data.messages||[]).forEach(m => {
            if (String(m.receiver).trim().toLowerCase()===currentUser.toLowerCase() && m.status!=='comment') {
                const sender = String(m.sender).trim().toLowerCase();
                const msgId  = m.chat_id || (m.sender+'_'+(m.timestamp||'')+'_'+String(m.text||'').slice(0,20));
                if (!unreadPerSender[sender]) unreadPerSender[sender] = new Set();
                unreadPerSender[sender].add(msgId);
            }
        });

        const hasAnyUnread = Object.keys(unreadPerSender).some(s => unreadPerSender[s].size > (seenPerSender[s]||0));
        document.getElementById('chatDot').style.display = hasAnyUnread ? 'block' : 'none';

        const container = document.getElementById('chatListContainer');
        if (!partners.size) { container.innerHTML = '<div class="empty-state">NO CONNECTIONS TO CHAT WITH</div>'; return; }

        // Get last message per partner
        const lastMsg = {};
        (data.messages||[]).forEach(m => {
            if (m.status==='comment') return;
            const s = String(m.sender).trim().toLowerCase();
            const r = String(m.receiver).trim().toLowerCase();
            if (s===currentUser.toLowerCase()||r===currentUser.toLowerCase()) {
                const partner = s===currentUser.toLowerCase() ? r : s;
                if (!lastMsg[partner] || new Date(m.timestamp) > new Date(lastMsg[partner].timestamp)) lastMsg[partner] = m;
            }
        });

        container.innerHTML = Array.from(partners).map(p => {
            const pLower = p.toLowerCase();
            const total  = unreadPerSender[pLower] ? unreadPerSender[pLower].size : 0;
            const seen   = seenPerSender[pLower] || 0;
            const hasUnread = total > seen;
            const isOnline = onlineUsers.has(pLower);
            const last = lastMsg[pLower];
            const lastText = last ? (last.attached_media ? '📎 Media' : String(last.text||'').slice(0,30)) : '';

            return `<div class="chat-card" onclick="openPrivateChatWithReply('${escHtml(p)}')">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="popup-avatar" style="position:relative;">
                        ${getAvatarHtml(p)}
                        ${isOnline ? '<span class="online-dot" style="position:absolute;bottom:0;right:0;border:2px solid var(--bg);"></span>' : ''}
                    </div>
                    <div>
                        <div class="chat-card-name">@${escHtml(p)}</div>
                        <div class="chat-card-sub" style="${hasUnread?'color:var(--neon);':''}">${hasUnread ? '● NEW MESSAGE' : (lastText || 'TAP TO OPEN →')}</div>
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                    ${hasUnread ? `<span style="background:#ff4d6d;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-weight:700;">${total-seen}</span>` : ''}
                    <span style="color:var(--neon);font-size:18px;">›</span>
                </div>
            </div>`;
        }).join('');
    } catch(e) {}
}
