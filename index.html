    document.getElementById('chatSyncStatus').textContent = 'CONNECTING...';
    document.getElementById('chatMessages').innerHTML = `<div class="typing-indicator" id="typingIndicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
    document.getElementById('replyBar').classList.remove('visible');
    document.getElementById('msgInput').placeholder = 'Message...';
    document.getElementById('privateChatScreen').classList.add('open');
    document.getElementById('msgInput').focus();

    apiGet().then(data => {
        const msgs = (data.messages||[]).filter(m =>
            String(m.receiver).trim().toLowerCase()===currentUser.toLowerCase() &&
            String(m.sender).trim().toLowerCase()===username.toLowerCase() &&
            m.status!=='comment'
        );
        const seenPerSender = JSON.parse(localStorage.getItem('lapp_seen_per')||'{}');
        seenPerSender[username.toLowerCase()] = msgs.length;
        localStorage.setItem('lapp_seen_per', JSON.stringify(seenPerSender));
        // Update online status in header
        const isOnline = onlineUsers.has(username.toLowerCase());
        document.getElementById('chatHeaderOnline').textContent = isOnline ? '🟢 ONLINE' : '';
    }).catch(()=>{});

    syncMessages();
    clearInterval(syncTimer);
    syncTimer = setInterval(syncMessages, 2500);
}

function closePrivateChat() {
    clearInterval(syncTimer);
    activeChatWith = null; knownMsgIds.clear(); replyingToPost = null;
    document.getElementById('replyBar').classList.remove('visible');
    document.getElementById('privateChatScreen').classList.remove('open');
    syncTimer = setInterval(loadChatList, 5000);
}

// ── TYPING INDICATOR ──────────────────────────────────────────────────────────
function onTyping() {
    if (!activeChatWith) return;
    apiPost({ action:'setTyping', sender:currentUser, receiver:activeChatWith });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => {
        apiPost({ action:'clearTyping', sender:currentUser, receiver:activeChatWith });
    }, 2000);
}

async function syncMessages() {
    if (!activeChatWith) return;
    try {
        const data = await apiGet();

        // Check typing status
        const isTyping = (data.typing || []).some(t =>
            String(t.sender||'').toLowerCase() === activeChatWith.toLowerCase() &&
            String(t.receiver||'').toLowerCase() === currentUser.toLowerCase()
        );
        const typingEl = document.getElementById('typingIndicator');
        if (typingEl) typingEl.classList.toggle('visible', isTyping);

        // Update online status
        const isOnline = onlineUsers.has(activeChatWith.toLowerCase()) || (data.online||[]).map(u=>String(u).toLowerCase()).includes(activeChatWith.toLowerCase());
        document.getElementById('chatHeaderOnline').textContent = isOnline ? '🟢 ONLINE' : '';

        const convo = (data.messages||[]).filter(m => {
            if (m.status==='comment' && (!m.receiver||String(m.receiver).trim()==='')) return false;
            return (String(m.sender).trim().toLowerCase()===currentUser.toLowerCase() && String(m.receiver).trim().toLowerCase()===activeChatWith.toLowerCase()) ||
                   (String(m.sender).trim().toLowerCase()===activeChatWith.toLowerCase() && String(m.receiver).trim().toLowerCase()===currentUser.toLowerCase());
        }).sort((a,b) => new Date(a.timestamp||0)-new Date(b.timestamp||0));

        const container = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');
        let hasNew = false;

        convo.forEach((m, idx) => {
            const key = m.chat_id || `${m.sender}_${m.timestamp}_${String(m.text).slice(0,20)}`;
            if (knownMsgIds.has(key)) return;
            knownMsgIds.add(key);
            const isMe   = String(m.sender).trim().toLowerCase()===currentUser.toLowerCase();
            const msgId  = m.chat_id || '';
            const isLast = idx===convo.length-1;

            const op = container.querySelector(`[data-optimistic="${CSS.escape(String(m.text||'').slice(0,20))}"]`);
            if (op) op.remove();

            const hasPost = !!(m.attached_media||m.posturl||m.postUrl);
            const isVoice = m.msgtype === 'voice' || String(m.text||'').startsWith('[VOICE]');
            const isStoryReply = m.msgtype === 'story_reply';
            let el;

            if (hasPost && isStoryReply) {
                el = buildStoryReplyBubble(m, isMe);
            } else if (hasPost) {
                el = buildReplyBubble(m, isMe);
            } else if (isVoice) {
                el = buildVoiceBubble(m, isMe);
            } else {
                el = document.createElement('div');
                el.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
                el.textContent = m.text;
            }

            // Add reactions display
            const reactions = safeParseArr(m.reactions || '[]');
            if (reactions.length) {
                const rd = document.createElement('div');
                rd.className = 'msg-reactions';
                const counts = {};
                reactions.forEach(r => { counts[r.emoji] = (counts[r.emoji]||0)+1; });
                rd.innerHTML = Object.entries(counts).map(([emoji,count]) =>
                    `<div class="msg-reaction-pill" onclick="addReaction('${msgId}','${emoji}')">${emoji} <span>${count}</span></div>`
                ).join('');
                el.appendChild(rd);
            }

            // Long press for reactions
            if (msgId) {
                el.dataset.msgId = msgId;
                let pressTimer;
                el.addEventListener('touchstart', () => {
                    pressTimer = setTimeout(() => showMsgOptions(msgId, el, isMe), 600);
                });
                el.addEventListener('touchend',  () => clearTimeout(pressTimer));
                el.addEventListener('touchmove', () => clearTimeout(pressTimer));
                el.addEventListener('contextmenu', e => { e.preventDefault(); showMsgOptions(msgId, el, isMe); });
            }

            // Insert before typing indicator
            if (typingIndicator && container.contains(typingIndicator)) {
                container.insertBefore(el, typingIndicator);
            } else {
                container.appendChild(el);
            }

            // Read receipt
            if (isMe && isLast) {
                const seen = document.createElement('div');
                seen.className = 'bubble-meta';
                const isRead = String(m.status||'').trim() === 'read';
                seen.textContent = isRead ? 'Seen ✓✓' : 'Sent ✓';
                seen.style.color = isRead ? 'var(--neon)' : 'var(--muted)';
                if (typingIndicator && container.contains(typingIndicator)) {
                    container.insertBefore(seen, typingIndicator);
                } else {
                    container.appendChild(seen);
                }
            }

            hasNew = true;
        });

        if (hasNew) container.scrollTop = container.scrollHeight;
        document.getElementById('chatSyncStatus').textContent = 'LIVE ●';
    } catch(e) {
        document.getElementById('chatSyncStatus').textContent = 'RECONNECTING...';
    }
}

function showMsgOptions(msgId, el, isMe) {
    // Show reaction picker + delete option
    const existing = document.getElementById('msgOptionsMenu');
    if (existing) existing.remove();

    const menu = document.createElement('div');
    menu.id = 'msgOptionsMenu';
    menu.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:10px 16px;display:flex;gap:12px;z-index:9000;box-shadow:0 4px 20px rgba(0,0,0,0.5);';
    menu.innerHTML = REACTIONS.map(r =>
        `<span style="font-size:22px;cursor:pointer;" onclick="addReaction('${msgId}','${r}');document.getElementById('msgOptionsMenu').remove()">${r}</span>`
    ).join('') + (isMe ? `<span style="font-size:22px;cursor:pointer;" onclick="showDeleteMsg('${msgId}',document.querySelector('[data-msg-id=\\'${msgId}\\']'));document.getElementById('msgOptionsMenu').remove()">🗑️</span>` : '');
    document.body.appendChild(menu);
    setTimeout(() => { if (menu.parentNode) menu.remove(); }, 4000);
}

async function addReaction(msgId, emoji) {
    await apiPost({ action:'addReaction', msgId, user:currentUser, emoji });
    setTimeout(syncMessages, 500);
}

function buildStoryReplyBubble(m, isMe) {
    const pUrl  = m.attached_media || m.posturl || m.postUrl || '';
    const pUser = m.postusername || m.postUsername || '?';
    const isVideo = /\.(mp4|mov|webm|avi)(\?|$)/i.test(pUrl);
    const wrap = document.createElement('div');
    wrap.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
    wrap.style.cssText = 'padding:0;overflow:hidden;max-width:78%;';
    const preview = isVideo
        ? `<video src="${escHtml(pUrl)}" muted playsinline style="width:100%;max-height:160px;object-fit:cover;display:block;opacity:0.7;"></video>`
        : `<img src="${escHtml(pUrl)}" style="width:100%;max-height:160px;object-fit:cover;display:block;opacity:0.7;">`;
    wrap.innerHTML = `
        <div style="position:relative;">
            ${preview}
            <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;">
                <div style="background:rgba(0,0,0,0.5);border-radius:8px;padding:3px 8px;font-size:9px;font-family:'Space Mono',monospace;color:white;letter-spacing:1px;">📖 STORY by @${escHtml(pUser)}</div>
            </div>
        </div>
        <div style="padding:8px 12px;font-size:13px;">${escHtml(m.text || '↩ Replied to story')}</div>`;
    return wrap;
}

function buildReplyBubble(m, isMe) {
    const pUrl  = m.attached_media || m.posturl || m.postUrl || '';
    const pUser = m.postusername || m.postUsername || '?';
    const rawType = m.posttype || m.postType || '';
    const isVideo = rawType==='video' || /\.(mp4|mov|webm|avi)(\?|$)/i.test(pUrl);
    const wrap = document.createElement('div');
    wrap.className = `reply-bubble ${isMe ? '' : 'them'}`;
    const MEDIA_STYLE = 'width:100%;height:260px;min-height:260px;max-height:260px;object-fit:cover;display:block;flex-shrink:0;';
    const previewEl = isVideo
        ? `<video src="${escHtml(pUrl)}" muted playsinline controls style="${MEDIA_STYLE}background:#000;"></video>`
        : `<img src="${escHtml(pUrl)}" alt="" style="${MEDIA_STYLE}" onerror="this.style.objectFit='contain';this.style.background='#1a1a1a';">`;
    wrap.innerHTML = `
        <div style="background:var(--card2);border-bottom:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;">
            ${previewEl}
            <div style="padding:8px 12px;flex-shrink:0;">
                <div style="font-size:9px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;">POST BY</div>
                <div style="font-size:11px;color:var(--neon);font-family:'Space Mono',monospace;font-weight:700;">@${escHtml(pUser)}</div>
            </div>
        </div>
        <div class="reply-text-bubble">${escHtml(m.text || '↩ Replied to a post')}</div>`;
    return wrap;
}

function buildVoiceBubble(m, isMe) {
    const wrap = document.createElement('div');
    wrap.className = `bubble ${isMe ? 'bubble-me' : 'bubble-them'}`;
    const audioUrl = m.attached_media || '';
    const duration = m.voiceDuration || '0:00';
    const bars = Array.from({length:20}, (_,i) => {
        const h = 4 + Math.random() * 22;
        return `<div class="voice-bar" style="height:${h}px;"></div>`;
    }).join('');
    wrap.innerHTML = `<div class="voice-bubble">
        <button class="voice-play-btn" onclick="playVoice('${escHtml(audioUrl)}', this)">▶</button>
        <div class="voice-waveform">${bars}</div>
        <span class="voice-duration">${duration}</span>
    </div>`;
    return wrap;
}

function playVoice(url, btn) {
    const audio = new Audio(url);
    btn.textContent = '⏸';
    audio.play();
    audio.onended = () => { btn.textContent = '▶'; };
}

function showDeleteMsg(msgId, el) {
    if (confirm('Delete this message?')) {
        if (el) el.style.opacity = '0.3';
        apiPost({ action:'deleteMessage', msgId, user:currentUser }).then(() => {
            if (el) el.remove();
            knownMsgIds.delete(msgId);
        });
    }
}

// ── VOICE RECORDING ───────────────────────────────────────────────────────────
async function toggleVoiceRecord() {
    if (isRecordingVoice) {
        // Stop recording
        mediaRecorder.stop();
        isRecordingVoice = false;
        document.getElementById('voiceBtn').classList.remove('recording');
        document.getElementById('voiceBtn').textContent = '🎤';
    } else {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
            mediaRecorder = new MediaRecorder(stream);
            voiceChunks = [];
            mediaRecorder.ondataavailable = e => voiceChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                stream.getTracks().forEach(t => t.stop());
                const blob = new Blob(voiceChunks, { type:'audio/webm' });
                await sendVoiceMessage(blob);
            };
            mediaRecorder.start();
            isRecordingVoice = true;
            document.getElementById('voiceBtn').classList.add('recording');
            document.getElementById('voiceBtn').textContent = '⏹';
            toast('Recording... tap ⏹ to send');
        } catch(e) {
            toast('Microphone access denied');
        }
    }
}

async function sendVoiceMessage(blob) {
    if (!activeChatWith) return;
    toast('Sending voice message...');
    const fd = new FormData();
    fd.append('file', blob, 'voice.webm');
    fd.append('upload_preset', PRESET);
    try {
        const cData = await xhrUpload(CLOUD_URL, fd, ()=>{});
        if (!cData.secure_url) throw new Error('Upload failed');
        await apiPost({
            action:'sendDM', sender:currentUser, receiver:activeChatWith,
            text:'🎤 Voice message', msgtype:'voice',
            postUrl:cData.secure_url, ts:Date.now()
        });
        setTimeout(syncMessages, 800);
    } catch(e) { toast('Voice send failed'); }
}

// ── SEND MESSAGE ──────────────────────────────────────────────────────────────
async function sendMsg() {
    const input = document.getElementById('msgInput');
    const text  = input.value.trim();
    if (!text || !activeChatWith || isSendingMsg) return;
    isSendingMsg = true;
    input.value = '';
    input.disabled = true;
    document.getElementById('sendBtn').disabled = true;

    const payload = { action:'sendDM', sender:currentUser, receiver:activeChatWith, text, ts:Date.now() };
    if (replyingToPost) {
        payload.postUrl      = replyingToPost.url;
        payload.postType     = replyingToPost.type;
        payload.posttype     = replyingToPost.type;
        payload.postUsername = replyingToPost.username;
        payload.postusername = replyingToPost.username;
    }

    const container = document.getElementById('chatMessages');
    const opKey = text.slice(0,20);
    const typingIndicator = document.getElementById('typingIndicator');

    if (replyingToPost) {
        const ob = buildReplyBubble({ text, posturl:replyingToPost.url, postusername:replyingToPost.username, posttype:replyingToPost.type }, true);
        ob.classList.add('bubble-sending'); ob.dataset.optimistic = opKey;
        if (typingIndicator && container.contains(typingIndicator)) container.insertBefore(ob, typingIndicator);
        else container.appendChild(ob);
    } else {
        const bubble = document.createElement('div');
        bubble.className = 'bubble bubble-me bubble-sending';
        bubble.textContent = text; bubble.dataset.optimistic = opKey;
        if (typingIndicator && container.contains(typingIndicator)) container.insertBefore(bubble, typingIndicator);
        else container.appendChild(bubble);
    }
    container.scrollTop = container.scrollHeight;

    const ok = await apiPost(payload);
    if (!ok) {
        const op = container.querySelector(`[data-optimistic="${CSS.escape(opKey)}"]`);
        if (op) op.remove();
        toast('Message failed to send');
    }

    if (replyingToPost) cancelReply();
    input.disabled = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
    isSendingMsg = false;
    setTimeout(syncMessages, 800);
}

// ── UTILITIES ─────────────────────────────────────────────────────────────────
function safeParseArr(val) {
    if (Array.isArray(val)) return val;
    if (!val || val===''||val==='false'||val==='0') return [];
    try { const r=JSON.parse(val); return Array.isArray(r)?r:[]; } catch(e) { return []; }
}

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
